        #content-wrapper {
  transition: transform 0.3s ease;
  will-change: transform;
}

#tab-content {
  height: 60px; /* height of spinner zone */
}

/* FOOTER BLOCKER - This will block content from showing through */
.footer-blocker {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 150px;
  background: linear-gradient(to top, #111111 70%, transparent);
  z-index: 999;
  pointer-events: none;
}
        
.spinner {
  font-size: 36px;
  position: relative;
  display: inline-block;
  width: 1em;
  height: 1em;
}
.spinner.center {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  margin: auto;
}
.spinner .spinner-blade {
  position: absolute;
  left: 0.43em;              /* closer to center */
  bottom: 0;
  width: 0.084em;
  height: 0.2777em;
  border-radius: 0.0655em;
  background-color: transparent;
  transform-origin: center -0.11em;  /* slightly closer pivot */
  animation: spinner-fade 1s infinite linear;
}

/* 8 blades = 45° apart, delay = 0.125s apart */
.spinner .spinner-blade:nth-child(1) {
  transform: rotate(0deg);
  animation-delay: 0s;
}
.spinner .spinner-blade:nth-child(2) {
  transform: rotate(45deg);
  animation-delay: 0.125s;
}
.spinner .spinner-blade:nth-child(3) {
  transform: rotate(90deg);
  animation-delay: 0.25s;
}
.spinner .spinner-blade:nth-child(4) {
  transform: rotate(135deg);
  animation-delay: 0.375s;
}
.spinner .spinner-blade:nth-child(5) {
  transform: rotate(180deg);
  animation-delay: 0.5s;
}
.spinner .spinner-blade:nth-child(6) {
  transform: rotate(225deg);
  animation-delay: 0.625s;
}
.spinner .spinner-blade:nth-child(7) {
  transform: rotate(270deg);
  animation-delay: 0.75s;
}
.spinner .spinner-blade:nth-child(8) {
  transform: rotate(315deg);
  animation-delay: 0.875s;
}

@keyframes spinner-fade {
  0%   { background-color: #69717d; }
  100% { background-color: transparent; }
}
